name: dipok
description: Dice Poker — Traditional Portuguese Poker de Dados
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.0.0
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.2
  flutter_markdown: ^0.7.4
  url_launcher: ^6.3.0

dev_dependencies:
  test: ^1.24.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/rules/
